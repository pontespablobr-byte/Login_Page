<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tela de Login Responsiva</title>
    <link rel="stylesheet" href="Layout.css/cadastro.css" />
  </head>
  <body>
    <main class="container">
      <aside class="branding">
        <h1>Enervision</h1>
        <p>Bem-vindo de volta! Faça login formulário</p>
      </aside>

      <section class="login">
        <form>
          <h2>Entrar na conta </h2>
          <p>Bem-vindo de volta! Preencha seus dados.</p>

          <div class="field">
            <label for="email">E-mail</label>
            <input
              type="email"
              id="email"
              placeholder="seu@email.com"
              required
            />
          </div>

          <div class="field">
            <label for="password">Senha</label>
            <input
              type="password"
              id="password"
              placeholder="Digite sua senha"
              required
            />
          </div>
          <div>
            <a href="Recuperar senha">Esqueci a senha</a>
          </div>

          <button type="submit">Entrar</button>
        </form>
      </section>
    </main>
  </body>
</html>
